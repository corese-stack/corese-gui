name: Publish Maven Central

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            ref:
                description: "Branch, tag, or commit to publish (required)"
                required: true
                type: string

permissions:
    contents: read

jobs:
    release-maven-central:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.ref || github.ref }}

            - name: Validate Gradle wrapper
              uses: gradle/actions/wrapper-validation@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: gradle

            - name: Publish to Maven Central via Vanniktech
              env:
                  ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
                  ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
                  ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
                  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
              run: ./gradlew --no-daemon publishToMavenCentral

            - name: Manual release reminder
              run: echo "Upload complete. Finalize deployment on https://central.sonatype.com/publishing/deployments"
