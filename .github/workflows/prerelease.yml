name: Publish Development Pre-release

on:
    push:
        branches:
            - develop
    workflow_dispatch:
        inputs:
            ref:
                description: "Branch, tag, or commit to pre-release (default: develop HEAD)"
                required: false
                type: string

permissions:
    contents: write

jobs:
    build-artifacts:
        name: Build (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-24.04
                      target: linux-x64
                      gradle_cmd: ./gradlew
                      jpackage_type: app-image
                    - os: windows-2025
                      target: windows-x64
                      gradle_cmd: ./gradlew.bat
                      jpackage_type: exe
                    - os: macos-15-intel
                      target: macos-x64
                      gradle_cmd: ./gradlew
                      jpackage_type: dmg
                    - os: macos-15
                      target: macos-arm64
                      gradle_cmd: ./gradlew
                      jpackage_type: dmg

        steps:
            - name: Checkout sources
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.ref || github.ref }}

            - name: Validate Gradle wrapper
              uses: gradle/actions/wrapper-validation@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: gradle

            - name: Build pre-release artifacts for current platform
              run: ${{ matrix.gradle_cmd }} --no-daemon clean shadowJar jpackageCurrentPlatform -PjpackageType=${{ matrix.jpackage_type }}

            - name: Upload pre-release artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: corese-gui-prerelease-${{ matrix.target }}
                  path: |
                      build/libs/*-standalone-${{ matrix.target }}.jar
                      build/jpackage/output/${{ matrix.target }}/**

    publish-prerelease:
        name: Publish or update dev-prerelease
        needs: build-artifacts
        runs-on: ubuntu-24.04

        steps:
            - name: Download all pre-release artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: corese-gui-prerelease-*
                  merge-multiple: true
                  path: build/prerelease-assets

            - name: Generate build timestamp
              id: timestamp
              run: |
                  echo "timestamp=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

            - name: Generate checksums
              run: |
                  cd build/prerelease-assets
                  find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

            - name: Publish single rolling pre-release
              uses: ncipollo/release-action@v1
              with:
                  artifacts: "build/prerelease-assets/**/*"
                  tag: dev-prerelease
                  name: Development Pre-release
                  body: |
                      Latest unsigned multi-platform build from `develop`.

                      Last updated: ${{ steps.timestamp.outputs.timestamp }}
                      Source ref: `${{ github.event.inputs.ref || github.ref_name }}`
                      Commit: `${{ github.sha }}`
                  prerelease: true
                  allowUpdates: true
                  replacesArtifacts: true
