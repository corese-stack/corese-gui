name: Continuous Integration

on:
    push:
        branches: ["main", "develop"]
    pull_request:
        branches: ["main", "develop"]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Validate Gradle wrapper
              uses: gradle/actions/wrapper-validation@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: gradle

            - name: Build and test
              run: ./gradlew --no-daemon clean build installDist releasePackage

            - name: Upload CI artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: corese-gui-ci-artifacts
                  path: |
                      build/libs/*.jar
                      build/release/*.zip
                      build/reports/**
                      build/test-results/**
