name: Continuous Integration

on:
    push:
        branches: ["main", "develop"]
    pull_request:
        branches: ["main", "develop"]
    workflow_dispatch:

permissions:
    contents: read
    checks: write
    pull-requests: write

jobs:
    build-test:
        name: CI (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-24.04
                      target: linux-x64
                      gradle_cmd: ./gradlew
                    - os: windows-2025
                      target: windows-x64
                      gradle_cmd: ./gradlew.bat
                    - os: macos-15-intel
                      target: macos-x64
                      gradle_cmd: ./gradlew
                    - os: macos-15
                      target: macos-arm64
                      gradle_cmd: ./gradlew

        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Validate Gradle wrapper
              uses: gradle/actions/wrapper-validation@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: gradle

            - name: Build, test, and package standalone JAR
              run: ${{ matrix.gradle_cmd }} --no-daemon clean check shadowJar

            - name: Upload CI artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: corese-gui-ci-${{ matrix.target }}
                  path: |
                      build/libs/*-standalone-${{ matrix.target }}.jar
                      build/reports/**
                      build/test-results/**

            - name: Publish test results in PR checks
              if: always() && matrix.os == 'ubuntu-24.04'
              uses: EnricoMi/publish-unit-test-result-action@v2
              with:
                  files: |
                      build/test-results/**/*.xml
