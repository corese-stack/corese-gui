name: Publish GitHub Release

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Validate Gradle wrapper
              uses: gradle/actions/wrapper-validation@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: gradle

            - name: Build release artifacts
              run: ./gradlew --no-daemon clean jar installDist releasePackage

            - name: Generate checksums
              run: |
                  mkdir -p build/release
                  sha256sum build/libs/corese-gui-*.jar build/release/corese-gui-*.zip > build/release/SHA256SUMS.txt

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: |
                      build/libs/corese-gui-*.jar
                      build/release/corese-gui-*.zip
                      build/release/SHA256SUMS.txt
