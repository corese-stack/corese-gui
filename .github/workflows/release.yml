name: Publish GitHub Release

on:
    workflow_dispatch:
        inputs:
            ref:
                description: "Tag to release (example: v5.0.0)"
                required: true
                type: string
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    build-artifacts:
        name: Build (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-24.04
                      target: linux-x64
                      gradle_cmd: ./gradlew
                      jpackage_type: app-image
                    - os: windows-2025
                      target: windows-x64
                      gradle_cmd: ./gradlew.bat
                      jpackage_type: exe
                    - os: macos-15-intel
                      target: macos-x64
                      gradle_cmd: ./gradlew
                      jpackage_type: dmg
                    - os: macos-15
                      target: macos-arm64
                      gradle_cmd: ./gradlew
                      jpackage_type: dmg

        steps:
            - name: Checkout sources
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.ref || github.ref }}

            - name: Validate Gradle wrapper
              uses: gradle/actions/wrapper-validation@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: gradle

            - name: Build release artifacts for current platform
              run: ${{ matrix.gradle_cmd }} --no-daemon clean shadowJar jpackageCurrentPlatform -PjpackageType=${{ matrix.jpackage_type }}

            - name: Upload release artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: corese-gui-${{ matrix.target }}
                  path: |
                      build/libs/*-standalone-${{ matrix.target }}.jar
                      build/jpackage/output/${{ matrix.target }}/**

    release:
        needs: build-artifacts
        runs-on: ubuntu-24.04
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

        steps:
            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: corese-gui-*
                  merge-multiple: true
                  path: build/release-assets

            - name: Generate checksums
              run: |
                  cd build/release-assets
                  find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.inputs.ref || github.ref_name }}
                  generate_release_notes: true
                  files: |
                      build/release-assets/**/*
