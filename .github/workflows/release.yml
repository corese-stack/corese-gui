name: Publish GitHub Release

on:
    workflow_dispatch:
        inputs:
            ref:
                description: "Tag to release (example: v5.0.0)"
                required: true
                type: string
    push:
        tags:
            - "v*.*.*"

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    build-artifacts:
        name: Build (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-24.04
                      target: linux-x64
                      gradle_cmd: ./gradlew
                      jpackage_type: app-image
                    - os: windows-2025
                      target: windows-x64
                      gradle_cmd: ./gradlew.bat
                      jpackage_type: exe
                    - os: macos-15-intel
                      target: macos-x64
                      gradle_cmd: ./gradlew
                      jpackage_type: dmg
                    - os: macos-15
                      target: macos-arm64
                      gradle_cmd: ./gradlew
                      jpackage_type: dmg

        steps:
            - name: Checkout sources
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.ref || github.ref }}

            - name: Validate Gradle wrapper
              uses: gradle/actions/wrapper-validation@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: gradle

            - name: Generate macOS jpackage icon
              if: startsWith(matrix.target, 'macos-')
              shell: bash
              run: |
                  set -euo pipefail
                  icon_src="src/main/resources/images/corese-gui-logo.png"
                  iconset_dir="build/tmp/corese-gui.iconset"
                  icon_out="build/tmp/corese-gui.icns"

                  rm -rf "$iconset_dir"
                  mkdir -p "$iconset_dir"

                  sips -z 16 16 "$icon_src" --out "$iconset_dir/icon_16x16.png"
                  sips -z 32 32 "$icon_src" --out "$iconset_dir/icon_16x16@2x.png"
                  sips -z 32 32 "$icon_src" --out "$iconset_dir/icon_32x32.png"
                  sips -z 64 64 "$icon_src" --out "$iconset_dir/icon_32x32@2x.png"
                  sips -z 128 128 "$icon_src" --out "$iconset_dir/icon_128x128.png"
                  sips -z 256 256 "$icon_src" --out "$iconset_dir/icon_128x128@2x.png"
                  sips -z 256 256 "$icon_src" --out "$iconset_dir/icon_256x256.png"
                  sips -z 512 512 "$icon_src" --out "$iconset_dir/icon_256x256@2x.png"
                  sips -z 512 512 "$icon_src" --out "$iconset_dir/icon_512x512.png"
                  sips -z 1024 1024 "$icon_src" --out "$iconset_dir/icon_512x512@2x.png"

                  iconutil -c icns "$iconset_dir" -o "$icon_out"
                  echo "JPACKAGE_ICON_PROP=-PjpackageIcon=$PWD/$icon_out" >> "$GITHUB_ENV"

            - name: Build release artifacts for current platform
              run: ${{ matrix.gradle_cmd }} --no-daemon clean shadowJar jpackageCurrentPlatform -PjpackageType=${{ matrix.jpackage_type }} ${{ env.JPACKAGE_ICON_PROP }}

            - name: Collect publishable artifacts
              shell: bash
              run: ./.github/scripts/collect-release-assets.sh "${{ matrix.target }}" "${{ matrix.jpackage_type }}" "build/publish/${{ matrix.target }}"

            - name: Upload release artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: corese-gui-${{ matrix.target }}
                  if-no-files-found: error
                  path: build/publish/${{ matrix.target }}/*

    release:
        needs: build-artifacts
        runs-on: ubuntu-24.04
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

        steps:
            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: corese-gui-*
                  merge-multiple: true
                  path: build/release-assets

            - name: Generate checksums
              run: |
                  cd build/release-assets
                  find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.inputs.ref || github.ref_name }}
                  generate_release_notes: true
                  files: |
                      build/release-assets/**/*
