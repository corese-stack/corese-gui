name: Build Platform Artifacts (Reusable)
run-name: Build artifacts for ${{ inputs.source_ref }} (${{ inputs.artifact_name_prefix }})

on:
    workflow_call:
        inputs:
            source_ref:
                description: "Branch, tag, or commit to build"
                required: true
                type: string
            artifact_name_prefix:
                description: "Prefix used for uploaded artifact names"
                required: true
                type: string
            project_version:
                description: "Optional Gradle project version override (for stable release tags)"
                required: false
                default: ""
                type: string

permissions:
    contents: read

jobs:
    build-artifacts:
        name: Build (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: true
            matrix:
                include:
                    - os: ubuntu-24.04
                      target: linux-x64
                      gradle_cmd: ./gradlew
                      jpackage_type: app-image
                    - os: ubuntu-24.04-arm
                      target: linux-arm64
                      gradle_cmd: ./gradlew
                      jpackage_type: app-image
                    - os: windows-2025
                      target: windows-x64
                      gradle_cmd: ./gradlew.bat
                      jpackage_type: exe
                    - os: macos-15-intel
                      target: macos-x64
                      gradle_cmd: ./gradlew
                      jpackage_type: dmg
                    - os: macos-15
                      target: macos-arm64
                      gradle_cmd: ./gradlew
                      jpackage_type: dmg

        steps:
            - name: Checkout sources
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.source_ref }}

            - name: Validate Gradle wrapper
              uses: gradle/actions/wrapper-validation@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: gradle

            - name: Build artifacts for current platform
              run: ${{ matrix.gradle_cmd }} --no-daemon clean shadowJar jpackageCurrentPlatform ${{ matrix.target == 'windows-x64' && 'windowsPortableZipCurrentPlatform' || '' }} -PjpackageType=${{ matrix.jpackage_type }} ${{ inputs.project_version != '' && format('''-PprojectVersion={0}''', inputs.project_version) || '' }}

            - name: Collect publishable artifacts
              shell: bash
              run: bash ./packaging/scripts/collect-distribution-assets.sh "${{ matrix.target }}" "${{ matrix.jpackage_type }}" "build/publish/${{ matrix.target }}"

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ inputs.artifact_name_prefix }}-${{ matrix.target }}
                  if-no-files-found: error
                  path: build/publish/${{ matrix.target }}/*
