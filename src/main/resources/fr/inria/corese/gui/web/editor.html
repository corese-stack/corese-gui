<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Corese Editor</title>
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="lib/codemirror/codemirror.min.css">
    <link rel="stylesheet" href="lib/codemirror/addon/hint/show-hint.min.css">

    <style>
        /* --- THEME VARIABLES (Default / Cupertino Light) --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #24292e;
            --gutter-bg: #f8f9fa;
            --gutter-text: #adb5bd;
            --status-bar-bg: #f3f3f3;
            --status-bar-border: #e1e4e8;
            --status-bar-text: #586069;
            --caret-color: #24292e;
            --selection-bg: #b3d7ff;
            --accent-color: #0078D4;
            --active-line-bg: #f1f8ff;

            /* Syntax Highlighting */
            --syntax-keyword: #7f0055;
            --syntax-atom: #219;
            --syntax-number: #164;
            --syntax-def: #00f;
            --syntax-variable: #000;
            --syntax-variable-2: #05a;
            --syntax-variable-3: #085;
            --syntax-property: #000;
            --syntax-operator: #000;
            --syntax-comment: #a50;
            --syntax-string: #a11;
            --syntax-meta: #555;
            --syntax-qualifier: #555;
            --syntax-builtin: #30a;
            --syntax-bracket: #997;
            --syntax-tag: #170;
            --syntax-attribute: #00c;
            --syntax-link: #00c;
            --syntax-error: #f00;
        }

        /* --- PRIMER LIGHT --- */
        body.theme-primer {
            --bg-color: #ffffff; /* Keep white for max readability */
            --text-color: #24292f;
            --gutter-bg: #f6f8fa;
            --gutter-text: #6e7781;
            --status-bar-bg: #ffffff;
            --status-bar-border: #d0d7de;
            --status-bar-text: #57606a;
            --caret-color: #24292f;
            --selection-bg: #b3d7ff;
            --active-line-bg: #f6f8fa;
        }

        /* --- NORD LIGHT --- */
        body.theme-nord {
            --bg-color: #ffffff; /* Changed from #eceff4 to White for contrast against UI */
            --text-color: #2e3440;
            --gutter-bg: #eceff4; /* Use the main theme color for gutter instead */
            --gutter-text: #4c566a;
            --status-bar-bg: #eceff4;
            --status-bar-border: #d8dee9;
            --status-bar-text: #4c566a;
            --caret-color: #2e3440;
            --selection-bg: #88c0d040;
            --active-line-bg: #f7f9fb; /* Very light subtle highlight */
            
            /* Nord Syntax Light Adjustments */
            --syntax-keyword: #81a1c1;
            --syntax-atom: #b48ead;
            --syntax-number: #b48ead;
            --syntax-def: #88c0d0;
            --syntax-variable: #2e3440;
            --syntax-string: #a3be8c;
            --syntax-comment: #4c566a;
        }

        /* --- DARK DEFAULTS (Cupertino Dark) --- */
        body.dark-theme {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --gutter-bg: #252526;
            --gutter-text: #858585;
            --status-bar-bg: #2d2d2d;
            --status-bar-border: #3e3e42;
            --status-bar-text: #cccccc;
            --caret-color: #d4d4d4;
            --selection-bg: #264f78;
            --active-line-bg: #2c2c2c;

            /* Syntax Highlighting - Dark Defaults */
            --syntax-keyword: #c586c0;
            --syntax-atom: #569cd6;
            --syntax-number: #b5cea8;
            --syntax-def: #dcdcaa;
            --syntax-variable: #9cdcfe;
            --syntax-variable-2: #4ec9b0;
            --syntax-variable-3: #dcdcaa;
            --syntax-property: #d4d4d4;
            --syntax-operator: #d4d4d4;
            --syntax-comment: #6a9955;
            --syntax-string: #ce9178;
            --syntax-meta: #569cd6;
            --syntax-qualifier: #dcdcaa;
            --syntax-builtin: #4ec9b0;
            --syntax-bracket: #ffd700;
            --syntax-tag: #569cd6;
            --syntax-attribute: #9cdcfe;
            --syntax-link: #3794ff;
            --syntax-error: #f44747;
        }

        /* --- PRIMER DARK --- */
        body.theme-primer.dark-theme {
            --bg-color: #010409; /* Darker than UI (#0d1117) for depth */
            --text-color: #c9d1d9;
            --gutter-bg: #0d1117; /* Matches UI background for seamless gutter */
            --gutter-text: #8b949e;
            --status-bar-bg: #0d1117;
            --status-bar-border: #30363d;
            --status-bar-text: #8b949e;
            --caret-color: #c9d1d9;
            --selection-bg: #1f6feb40;
            --active-line-bg: #0d1117;
            
            /* Primer Dark Syntax */
            --syntax-keyword: #ff7b72;
            --syntax-atom: #79c0ff;
            --syntax-number: #79c0ff;
            --syntax-def: #d2a8ff;
            --syntax-variable: #c9d1d9;
            --syntax-string: #a5d6ff;
            --syntax-comment: #8b949e;
        }

        /* --- NORD DARK --- */
        body.theme-nord.dark-theme {
            --bg-color: #242933; /* Slightly darker than UI (#2e3440) for focus */
            --text-color: #d8dee9;
            --gutter-bg: #2e3440; /* Matches UI background */
            --gutter-text: #616e88;
            --status-bar-bg: #2e3440;
            --status-bar-border: #434c5e;
            --status-bar-text: #d8dee9;
            --caret-color: #d8dee9;
            --selection-bg: #434c5e;
            --active-line-bg: #2e3440;

            /* Nord Dark Syntax */
            --syntax-keyword: #81a1c1;
            --syntax-atom: #b48ead;
            --syntax-number: #b48ead;
            --syntax-def: #88c0d0;
            --syntax-variable: #d8dee9;
            --syntax-variable-2: #8fbcbb;
            --syntax-property: #d8dee9;
            --syntax-operator: #81a1c1;
            --syntax-comment: #616e88;
            --syntax-string: #a3be8c;
            --syntax-tag: #81a1c1;
            --syntax-attribute: #8fbcbb;
        }


        /* --- BASE CSS --- */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .editor-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* --- CODEMIRROR OVERRIDES --- */
        .CodeMirror {
            height: 100%;
            width: 100%;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Segoe UI Mono', 'Roboto Mono', 'Source Code Pro', 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .CodeMirror-gutters {
            background-color: var(--gutter-bg);
            border-right: 1px solid var(--status-bar-border);
            color: var(--gutter-text);
        }

        .CodeMirror-linenumber {
            color: var(--gutter-text);
        }

        .CodeMirror-cursor {
            border-left: 2px solid var(--caret-color) !important;
        }

        .CodeMirror-selected {
            background-color: var(--selection-bg) !important;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background-color: var(--selection-bg) !important;
        }
        
        .CodeMirror-activeline-background {
            background: var(--active-line-bg);
        }

        /* --- SYNTAX HIGHLIGHTING --- */
        .cm-keyword { color: var(--syntax-keyword) !important; }
        .cm-atom { color: var(--syntax-atom) !important; }
        .cm-number { color: var(--syntax-number) !important; }
        .cm-def { color: var(--syntax-def) !important; }
        .cm-variable { color: var(--syntax-variable) !important; }
        .cm-variable-2 { color: var(--syntax-variable-2) !important; }
        .cm-variable-3 { color: var(--syntax-variable-3) !important; }
        .cm-property { color: var(--syntax-property) !important; }
        .cm-operator { color: var(--syntax-operator) !important; }
        .cm-comment { color: var(--syntax-comment) !important; }
        .cm-string { color: var(--syntax-string) !important; }
        .cm-string-2 { color: var(--syntax-string) !important; }
        .cm-meta { color: var(--syntax-meta) !important; }
        .cm-qualifier { color: var(--syntax-qualifier) !important; }
        .cm-builtin { color: var(--syntax-builtin) !important; }
        .cm-bracket { color: var(--syntax-bracket) !important; }
        .cm-tag { color: var(--syntax-tag) !important; }
        .cm-attribute { color: var(--syntax-attribute) !important; }
        .cm-link { color: var(--syntax-link) !important; }
        .cm-error { color: var(--syntax-error) !important; }

        /* --- STATUS BAR --- */
        .status-bar {
            height: 26px;
            background-color: var(--status-bar-bg);
            border-top: 1px solid var(--status-bar-border);
            display: flex;
            align-items: center;
            justify-content: space-between; /* Push left and right apart */
            padding: 0 10px;
            font-size: 11px;
            color: var(--status-bar-text);
            user-select: none;
            z-index: 10;
        }

        .status-bar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-bar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-separator {
             margin: 0 5px;
             color: var(--status-bar-border);
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <div class="editor-wrapper">
            <textarea id="editor" autocomplete="off" spellcheck="false"></textarea>
        </div>

        <div class="status-bar">
            <div class="status-bar-left">
                <div id="mode-display" style="font-weight: bold;" title="Plain Text">Plain Text</div>
            </div>
            
            <div class="status-bar-right">
                <span id="cursor-position">Ln 1, Col 1</span>
                <span id="selection-count"></span>
                <span class="status-separator">|</span>
                <span>Spaces: 4</span>
                <span class="status-separator">|</span>
                <span>UTF-8</span>
            </div>
        </div>
    </div>

    <!-- CODE MIRROR SCRIPTS -->
    <script src="lib/codemirror/codemirror.min.js"></script>
    
    <!-- MODES -->
    <script src="lib/codemirror/mode/sparql/sparql.min.js"></script>
    <script src="lib/codemirror/mode/turtle/turtle.min.js"></script>
    <script src="lib/codemirror/mode/xml/xml.min.js"></script>
    <script src="lib/codemirror/mode/javascript/javascript.min.js"></script>

    <!-- ADDONS -->
    <script src="lib/codemirror/addon/edit/matchbrackets.min.js"></script>
    <script src="lib/codemirror/addon/edit/closebrackets.min.js"></script>
    <script src="lib/codemirror/addon/comment/comment.min.js"></script>
    <script src="lib/codemirror/addon/hint/show-hint.min.js"></script>

    <script>
        // =========================================================================
        // 1. DEBUGGING BRIDGE
        // =========================================================================
        globalThis.onerror = function (msg, url, line, col, error) {
            if (globalThis.bridge) {
                globalThis.bridge.log("JS ERROR: " + msg + " (Line: " + line + ")");
            }
        };

        var oldLog = console.log;
        console.log = function (msg) {
            if (globalThis.bridge) globalThis.bridge.log(msg);
            oldLog.apply(console, arguments);
        };

        // =========================================================================
        // 2. INITIALIZATION
        // =========================================================================
        
        var editorArea = document.getElementById('editor');
        var cm = CodeMirror.fromTextArea(editorArea, {
            lineNumbers: true,
            mode: "text/plain", // Default
            matchBrackets: true,
            autoCloseBrackets: true,
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: false,
            styleActiveLine: true,
            extraKeys: {
                "Ctrl-Space": "autocomplete",
                "Cmd-/": "toggleComment",
                "Ctrl-/": "toggleComment"
            }
        });

        // =========================================================================
        // 3. EVENTS
        // =========================================================================

        cm.on("change", function(instance, changeObj) {
            if (changeObj.origin === 'setValue') return;
            if (globalThis.bridge) {
                globalThis.bridge.onContentChanged(instance.getValue());
            }
            updateStatusBar();
        });

        cm.on("cursorActivity", function() {
            updateStatusBar();
        });

        function updateStatusBar() {
            var pos = cm.getCursor();
            var line = pos.line + 1;
            var col = pos.ch + 1;
            
            document.getElementById('cursor-position').textContent = 'Ln ' + line + ', Col ' + col;
            
            var selection = cm.getSelection();
            var selLength = selection.length;
            document.getElementById('selection-count').textContent = selLength > 0 ? '(' + selLength + ' selected)' : '';
        }

        // =========================================================================
        // 4. PUBLIC API
        // =========================================================================

        globalThis.setContent = function (content) {
            if (content !== cm.getValue()) {
                cm.setValue(content || '');
                cm.clearHistory();
            }
            updateStatusBar();
        };

        globalThis.getContent = function () {
            return cm.getValue();
        };

        globalThis.setReadOnly = function (isReadOnly) {
            cm.setOption("readOnly", isReadOnly);
        };

        globalThis.setMode = function (modeName) {
            var mime = "text/plain";
            var displayName = "Plain Text";
            var tooltip = "";

            switch (modeName.toLowerCase()) {
                case "turtle":
                case "ttl":
                case "n3":
                case "nt":
                case "nq":
                case "trig":
                    mime = "text/turtle";
                    displayName = "Turtle";
                    tooltip = "Trig, Turtle, N-Triples, N-Quads, N3";
                    break;
                case "sparql":
                case "rq":
                    mime = "application/sparql-query";
                    displayName = "SPARQL";
                    break;
                case "xml":
                case "rdf":
                case "owl":
                    mime = "application/xml";
                    displayName = "XML/RDF";
                    break;
                case "json":
                case "jsonld":
                case "json-ld":
                    mime = "application/ld+json"; // Supported by javascript mode
                    displayName = "JSON-LD";
                    break;
            }

            cm.setOption("mode", mime);
            var modeDisplay = document.getElementById('mode-display');
            modeDisplay.textContent = displayName;
            modeDisplay.title = tooltip;
        };
        
        globalThis.setTheme = function (isDark, accentColor, themeName) {
            var root = document.documentElement;
            var body = document.body;
            
            // 1. Set Dark/Light Mode
            if (isDark) {
                body.classList.add('dark-theme');
            } else {
                body.classList.remove('dark-theme');
            }

            // 2. Set Theme Family (primer, nord, cupertino)
            // Remove existing theme-* classes
            body.className = body.className.replace(/\btheme-\S+/g, '').trim();
            if (themeName) {
                body.classList.add('theme-' + themeName.toLowerCase());
            }
            
            if (accentColor) {
                root.style.setProperty('--accent-color', accentColor);
                if (!isDark) {
                     // Lighter selection for light mode
                     root.style.setProperty('--selection-bg', accentColor + '40');
                } else {
                     // Slightly more opaque for dark mode visibility
                     root.style.setProperty('--selection-bg', accentColor + '60');
                }
            }
            
            // We use CSS variables to theme CodeMirror, so no need to change cm.setOption("theme", ...)
            // unless we want to support specific CodeMirror themes.
            // The CSS override block above handles mapping vars to CodeMirror classes.
        };

        // Initialize with bridge check
        globalThis.onload = function() {
            // Signal ready
            console.log("Editor Loaded.");
        }

    </script>
</body>
</html>
