<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Corese Editor</title>
    <style>
        /* --- LAYOUT --- */
        body,
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* --- CODEMIRROR OVERRIDES --- */
        .CodeMirror {
            flex: 1;
            height: 100% !important;
            width: 100%;
            font-family: 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Fallback textarea if JS fails */
        #editor {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- STATUS BAR --- */
        .status-bar {
            height: 26px;
            background-color: #f3f3f3;
            border-top: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 11px;
            color: #666;
            user-select: none;
        }

        .status-bar-right {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        /* --- ERROR INDICATORS --- */
        .error-indicators {
            position: absolute;
            bottom: 40px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
            pointer-events: none;
            /* Let clicks pass through */
        }

        .error-count,
        .warning-count {
            background-color: white;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
            opacity: 0.9;
        }

        .error-count {
            color: #d32f2f;
            border: 1px solid #ffcdd2;
        }

        .warning-count {
            color: #f57c00;
            border: 1px solid #ffe0b2;
        }

        /* --- LINTING STYLES --- */
        .CodeMirror-line-error {
            background-color: rgba(211, 47, 47, 0.1) !important;
        }

        .CodeMirror-line-warning {
            background-color: rgba(245, 124, 0, 0.1) !important;
        }

        .CodeMirror-lint-tooltip {
            z-index: 100;
        }

        /* --- OFFLINE ERROR MSG --- */
        #loading-error {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ef9a9a;
            z-index: 1000;
        }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/turtle/turtle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/n3@1.16.2/browser/n3.min.js"></script>
</head>

<body>
    <div id="loading-error">
        Network Error: Unable to load CodeMirror libraries. Editor features are disabled.
    </div>

    <div class="editor-container">
        <div class="error-indicators">
            <div class="error-count" id="error-count" style="display:none">
                <i class="fas fa-times-circle"></i> <span class="count">0</span>
            </div>
            <div class="warning-count" id="warning-count" style="display:none">
                <i class="fas fa-exclamation-triangle"></i> <span class="count">0</span>
            </div>
        </div>

        <textarea id="editor" autocomplete="off"></textarea>

        <div class="status-bar">
            <div class="status-bar-right">
                <span id="cursor-position">Ln 1, Col 1</span>
                <span style="margin: 0 10px; color: #ccc;">|</span>
                <span id="selection-count"></span>
                <span style="margin: 0 10px; color: #ccc;">|</span>
                <span id="editor-mode">Turtle</span>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // 1. GLOBAL VARIABLES & API DEFINITIONS (Defined FIRST to prevent Java crash)
        // =========================================================================

        var editor = null;
        var errorLines = [];

        // --- Java Bridge Helpers ---
        function safeLog(msg) {
            if (window.bridge) window.bridge.log(msg);
            else console.log(msg);
        }

        function safeError(msg) {
            if (window.bridge) window.bridge.log("ERROR: " + msg);
            else console.error(msg);
        }

        // --- Public API called by Java ---

        // Sets content into the editor (or textarea fallback)
        window.setContent = function (content) {
            if (editor) {
                var doc = editor.getDoc();
                var cursor = doc.getCursor();
                var scrollInfo = editor.getScrollInfo();
                editor.setValue(content || '');
                editor.setCursor(cursor);
                editor.scrollTo(scrollInfo.left, scrollInfo.top);
            } else {
                document.getElementById('editor').value = content || '';
            }
        };

        // Gets content from the editor (or textarea fallback)
        window.getContent = function () {
            if (editor) return editor.getValue();
            return document.getElementById('editor').value;
        };

        // Sets the editor theme
        window.setTheme = function (themeName) {
            if (editor) {
                editor.setOption("theme", themeName);
            }
        };

        // Sets status bar colors
        window.setStatusBarTheme = function (bgColor, textColor, borderColor) {
            var statusBar = document.querySelector('.status-bar');
            if (statusBar) {
                statusBar.style.backgroundColor = bgColor;
                statusBar.style.color = textColor;
                statusBar.style.borderTopColor = borderColor;
            }
        };

        // =========================================================================
        // 2. INITIALIZATION LOGIC
        // =========================================================================

        window.onload = function () {
            // CHECK IF LIBRARIES LOADED
            if (typeof CodeMirror === 'undefined') {
                document.getElementById('loading-error').style.display = 'block';
                safeError("CodeMirror JS not loaded. Check internet connection.");
                return; // Stop initialization, but API functions above still exist!
            }

            try {
                initCodeMirror();
            } catch (e) {
                safeError("Exception during init: " + e.message);
            }
        };

        function initCodeMirror() {
            // Register Linter Helper
            CodeMirror.registerHelper("lint", "turtle", turtleLinter);

            editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
                mode: 'turtle',
                theme: 'eclipse',
                lineNumbers: true,
                matchBrackets: true,
                autoCloseBrackets: true,
                lineWrapping: true,
                foldGutter: true,
                gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter", "CodeMirror-lint-markers"],
                lint: {
                    getAnnotations: turtleLinter,
                    async: true,
                    delay: 800 // Delay linting to avoid lag on typing
                },
                extraKeys: {
                    "Ctrl-Space": "autocomplete",
                    "Ctrl-/": "toggleComment"
                }
            });

            // Event Listeners
            editor.on('cursorActivity', updateStatusBar);

            editor.on('change', function (cm, change) {
                if (change.origin !== 'setValue' && window.bridge) {
                    window.bridge.onContentChanged(editor.getValue());
                }
            });

            // Zoom handling (Ctrl + Wheel)
            setupZoom();
        }

        // =========================================================================
        // 3. UTILITIES & LINTER
        // =========================================================================

        function updateStatusBar() {
            if (!editor) return;
            var pos = editor.getCursor();
            var sel = editor.getSelection();
            document.getElementById('cursor-position').textContent = 'Ln ' + (pos.line + 1) + ', Col ' + (pos.ch + 1);
            document.getElementById('selection-count').textContent = (sel && sel.length > 0) ? sel.length + ' chars' : '';
        }

        function setupZoom() {
            var fontSize = 14;
            editor.getWrapperElement().addEventListener('wheel', function (e) {
                if (e.ctrlKey) {
                    e.preventDefault();
                    if (e.deltaY < 0) fontSize++; else fontSize = Math.max(8, fontSize - 1);
                    editor.getWrapperElement().style.fontSize = fontSize + 'px';
                    editor.refresh();
                }
            });
        }

        // --- Turtle Linter ---
        function turtleLinter(text, callback) {
            // Safe check for N3 library
            if (typeof N3 === 'undefined') {
                callback([]); // No N3, no linting
                return;
            }

            var parser = new N3.Parser({ format: 'Turtle' });
            var issues = [];

            // Clear old error styling
            if (editor && errorLines.length > 0) {
                errorLines.forEach(line => editor.removeLineClass(line, 'background', 'CodeMirror-line-error'));
                errorLines = [];
            }

            parser.parse(text, (error, quad, prefixes) => {
                if (error) {
                    // Try to extract line number
                    var line = 0;
                    var col = 0;

                    // N3 usually gives 'error on line X'
                    var match = error.message.match(/line (\d+)/);
                    if (match) line = parseInt(match[1]) - 1;

                    issues.push({
                        message: error.message,
                        severity: 'error',
                        from: CodeMirror.Pos(line, col),
                        to: CodeMirror.Pos(line, 999)
                    });

                    if (editor) {
                        editor.addLineClass(line, 'background', 'CodeMirror-line-error');
                        errorLines.push(line);
                    }
                }
            });

            // Wait a bit for parsing to finish (simplistic approach for sync parser)
            setTimeout(() => {
                updateErrorBadges(issues);
                callback(issues);
            }, 50);
        }

        function updateErrorBadges(issues) {
            var errors = issues.filter(i => i.severity === 'error').length;
            var warns = issues.filter(i => i.severity === 'warning').length;

            var eBadge = document.getElementById('error-count');
            var wBadge = document.getElementById('warning-count');

            if (eBadge) {
                eBadge.style.display = errors > 0 ? 'flex' : 'none';
                eBadge.querySelector('.count').textContent = errors;
            }
            if (wBadge) {
                wBadge.style.display = warns > 0 ? 'flex' : 'none';
                wBadge.querySelector('.count').textContent = warns;
            }
        }
    </script>
</body>

</html>
