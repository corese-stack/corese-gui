<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Visualization</title>
    <script src="../web/lib/d3.min.js"></script>
    <script src="../web/lib/ttl2jsonld.js"></script>
    <style>
        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        #container {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
        }

        kg-graph {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="graph-controls" style="position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(255,255,255,0.95); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 10px 16px; font-size: 14px;">
            <label style="display: block; margin-bottom: 6px;">
                <input type="checkbox" id="toggle-labels" checked>
                Show rdfs:label
            </label>
            <label style="display: block;">
                <input type="checkbox" id="toggle-comments">
                Show rdfs:comment
            </label>
        </div>
        <kg-graph id="myGraph" width="100%" height="100%"></kg-graph>
    </div>

    <script>
        class KGGraphVis extends HTMLElement {
            setShowLabels(show) {
                if (!this.shadowRoot) return;
        
                d3.select(this.shadowRoot)
                  .selectAll('.nodes text')
                  .style('display', show ? null : 'none');
            }
            setShowComments(show) {
                if (!this.shadowRoot) return;
                d3.select(this.shadowRoot)
                  .selectAll('.rdfs-comment')
                  .style('display', show ? null : 'none');
            }

            constructor() {
                super()
                this.attachShadow({ mode: "open" });

                this.svg = null;
                this.simulation = null;
                this.defaultCharge = -50;
                this.defaultDistance = 150;

                this.internalData = new WeakMap()
                this.internalData.set(this, {});
                this.resizeObserver = null;
            }

            reset() {
                if (this.simulation) {
                    this.simulation.stop();
                    this.simulation = null;
                }
                if (this.svg) {
                    this.svg.selectAll("*").remove();
                }

                this.graph = null;
                this.jsonLDOntology = null;

                this.shadowRoot.innerHTML = '';
                this.render(); 
                this.svg = d3.select(this.shadowRoot.querySelector("#chart-container"));
            }



            set ttl(ttl) {
                const data = this.internalData.get(this) || {};
                data.ttl = ttl;
                this.internalData.set(this, data);
                this.drawChart()
            }

            get ttl() {
                return this.internalData.get(this)?.ttl;
            }

            async connectedCallback() {
                this.render();

                this.observeResize();

                await this.updateSize();

                this.svg = d3.select(this.shadowRoot.querySelector("#chart-container"))
                    .attr('width', this.width)
                    .attr('height', this.height)

                const defs = this.svg.append("defs");

                defs.append("marker")
                    .attr("id", "arrowhead")
                    .attr("viewBox", "0 -5 10 10")
                    .attr("refX", 15)
                    .attr("refY", 0)
                    .attr("markerWidth", 6)
                    .attr("markerHeight", 6)
                    .attr("orient", "auto")
                    .attr("fill", "#999")
                    .append("path")
                    .attr("d", "M0,-5L10,0L0,5");
            }

            disconnectedCallback() {
                if (this.resizeObserver) {
                    this.resizeObserver.disconnect();
                }
            }

            render() {
                this.shadowRoot.innerHTML = `
                    <style>
                        :host {
                            display: block;
                            width: 100%;
                            height: 100%;
                        }
                        .container {
                            width: 100%;
                            height: 100%;
                            box-sizing: border-box;
                        }
                        svg {
                            width: 100%;
                            height: 100%;
                            border: 1px solid #ccc;
                            display: block;
                        }
                    </style>
                    <div class="container">
                        <svg id="chart-container"></svg>
                    </div>
                `;
            }

            observeResize() {
                this.resizeObserver = new ResizeObserver(async () => {
                    await this.updateSize();
                    if (this.svg) {
                        this.svg.attr('width', this.width).attr('height', this.height);
                        // Optionally, re-render or adjust layout if needed
                        if (this.simulation) {
                            this.simulation.force("center", d3.forceCenter(this.width / 2, this.height / 2));
                            this.simulation.alpha(0.2).restart();
                        }
                    }
                });
                this.resizeObserver.observe(this);
            }

            async updateSize() {
                const rect = this.getBoundingClientRect();
                this.width = rect.width;
                this.height = rect.height;
            }

            async computePixelValue(attr) {
                return null;
            }

            async drawChart() {
                if (!this.width || !this.height) {
                    await this.updateSize();
                }
                if (this.simulation) {
                    this.simulation.stop();
                    this.simulation = null;
                }
                if (this.svg) {
                    this.svg.selectAll("*").remove();
                }
                this.svg = d3.select(this.shadowRoot.querySelector("#chart-container"))
                    .attr('width', this.width)
                    .attr('height', this.height);

                const defs = this.svg.append("defs");
                defs.append("marker")
                    .attr("id", "arrowhead")
                    .attr("viewBox", "0 -5 10 10")
                    .attr("refX", 15)
                    .attr("refY", 0)
                    .attr("markerWidth", 6)
                    .attr("markerHeight", 6)
                    .attr("orient", "auto")
                    .attr("fill", "#999")
                    .append("path")
                    .attr("d", "M0,-5L10,0L0,5");

                if (!this.ttl) return;

                this.jsonLDOntology = ttl2jsonld.parse(this.ttl);

                let graph = await this.createGraph();
                this.graph = await this.duplicateTargetsForMultipleLinks(graph);

                await this.layoutGraphWithHierarchy(this.graph);

                this.graph.nodes.forEach(node => {
                    if (typeof node.x !== 'number' || isNaN(node.x) || node.x === 0) node.x = this.width / 2 + (Math.random() - 0.5) * 200;
                    if (typeof node.y !== 'number' || isNaN(node.y) || node.y === 0) node.y = this.height / 2 + (Math.random() - 0.5) * 200;

                    if (node.x === undefined || node.y === undefined || (node.x === 0 && node.y === 0)) {
                        node.x = this.width / 2 + (Math.random() - 0.5) * 200;
                        node.y = this.height / 2 + (Math.random() - 0.5) * 200;
                    }

                });

                this.renderGraph();
                this.setControls();
            }

            async createGraph() {
                let graph = {
                    nodes: [],
                    links: []
                };
                const definedNodeIds = new Set();
                const addNode = (id, type) => {
                    if (!definedNodeIds.has(id)) {
                        graph.nodes.push({ id, name: id, type });
                        definedNodeIds.add(id);
                    }
                };
                this.jsonLDOntology['@graph'].forEach((item) => {
                    const subj = item['@id'] || item['@value'] || item['@node'] || item['@blank'] || item['@literal'];
                    let subjType = 'default';
                    if (item['@type'] === 'rdfs:Class') subjType = 'Class';
                    else if (item['@type'] === 'rdf:Property') subjType = 'Property';
                    else if (item['@type'] === 'Literal') subjType = 'Literal';
                    else if (subj && subj.startsWith('_:')) subjType = 'Blank';
                    addNode(subj, subjType);
                    Object.keys(item).forEach(pred => {
                        if (pred === '@id' || pred === '@type' || pred === 'rdfs:comment') return; // SKIP rdfs:comment
                        let objs = item[pred];
                        if (!Array.isArray(objs)) objs = [objs];
                        objs.forEach(obj => {
                            let objId = obj['@id'] || obj['@value'] || obj['@node'] || obj['@blank'] || obj['@literal'] || obj;
                            let objType = 'default';
                            if (obj['@type'] === 'rdfs:Class') objType = 'Class';
                            else if (obj['@type'] === 'rdf:Property') objType = 'Property';
                            else if (obj['@type'] === 'Literal' || obj['@value'] !== undefined) objType = 'Literal';
                            else if (objId && typeof objId === 'string' && objId.startsWith('_:')) objType = 'Blank';
                            addNode(objId, objType);
                            graph.links.push({ source: subj, target: objId, name: pred });
                        });
                    });
                });
                return graph;
            }

            async duplicateTargetsForMultipleLinks(graph) {
                const sourceTargetCount = {};

                graph.links.forEach(link => {
                    const key = `${link.source}->${link.target}`;
                    sourceTargetCount[key] = (sourceTargetCount[key] || 0) + 1;
                });

                const newNodes = [...graph.nodes];
                const newLinks = [];
                const copyIndex = {};

                graph.links.forEach(link => {
                    const key = `${link.source}->${link.target}`;

                    if (sourceTargetCount[key] > 1) {
                        copyIndex[key] = (copyIndex[key] || 0) + 1;

                        if (copyIndex[key] === 1) {
                            newLinks.push(link);
                        } else {
                            const originalTarget = graph.nodes.find(n => n.id === link.target);
                            const newTargetId = `${link.target}_copy${copyIndex[key]}`;
                            const newTarget = {
                                ...originalTarget,
                                id: newTargetId
                            };

                            newNodes.push(newTarget);
                            newLinks.push({
                                ...link,
                                target: newTargetId
                            });
                        }
                    } else {
                        newLinks.push(link);
                    }
                });
                return {
                    nodes: newNodes,
                    links: newLinks
                };
            }

            async buildHierarchy(graph) {
                const subclassLinks = graph.links.filter(l => l.name === 'rdfs:subClassOf');

                const childrenByParent = {};
                const allIds = new Set();

                subclassLinks.forEach(link => {
                    if (!childrenByParent[link.target]) {
                        childrenByParent[link.target] = [];
                    }
                    childrenByParent[link.target].push(link.source);
                    allIds.add(link.source);
                    allIds.add(link.target);
                });

                const childIds = new Set(subclassLinks.map(l => l.source));
                const rootIds = [...allIds].filter(id => !childIds.has(id));

                function buildNode(id) {
                    return {
                        id,
                        children: (childrenByParent[id] || []).map(buildNode)
                    };
                }
                return rootIds.map(buildNode);
            }

            async layoutGraphWithHierarchy(graph) {
                const hierarchyRoots = await this.buildHierarchy(graph);

                const tree = d3.tree().nodeSize([70, 200]);
                const positionedNodes = new Map();

                hierarchyRoots.forEach((root, index) => {
                    const rootHierarchy = d3.hierarchy(root, d => d.children);
                    tree(rootHierarchy);

                    const xOffset = index * 400;

                    rootHierarchy.descendants().forEach(d => {
                        positionedNodes.set(d.data.id, {
                            x: d.y + xOffset,
                            y: d.x
                        });
                    });
                });

                graph.nodes.forEach(node => {
                    if (positionedNodes.has(node.id)) {
                        const pos = positionedNodes.get(node.id);
                        node.fx = pos.x;
                        node.fy = pos.y;
                    }
                });

                graph.nodes.forEach(node => {
                    if (!node.x && !node.y) {
                        const linked = graph.links.filter(l => l.source === node.id || l.target === node.id);
                        const connected = linked.map(l =>
                            l.source === node.id ? l.target : l.source
                        ).filter(id => positionedNodes.has(id));

                        if (connected.length > 0) {
                            const avgX = d3.mean(connected.map(id => positionedNodes.get(id).x));
                            const avgY = d3.mean(connected.map(id => positionedNodes.get(id).y));
                            node.x = avgX + (Math.random() - 0.5) * 50;
                            node.y = avgY + 100 + (Math.random() - 0.5) * 30;
                        } else {
                            node.x = Math.random() * 800;
                            node.y = 800;
                        }
                    }
                });
            }

            setupSimulation() {
                this.graph.nodes.forEach(d => {
                    d.x = Math.random() * this.width;
                    d.y = Math.random() * this.height;
                });

                this.simulation = d3.forceSimulation(this.graph.nodes)
                    .force("link", d3.forceLink(this.graph.links)
                        .id(d => d.id)
                        .distance(300)
                        .strength(0.8)
                    )
                    .force("charge", d3.forceManyBody().strength(-600))
                    .force("center", d3.forceCenter(this.width / 2, this.height / 2))
                    .force("collision", d3.forceCollide().radius(d => d.type === "Literal" ? 60 : 50))
                    .force("x", d3.forceX(this.width / 2).strength(0.02))
                    .force("y", d3.forceY(this.height / 2).strength(0.02));



                this.simulation.on('end', () => {
                    this.graph.nodes.forEach(n => {
                        if (n.fx !== undefined) delete n.fx;
                        if (n.fy !== undefined) delete n.fy;
                    });
                });
            }




            updatePositions() {
                this.link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y)
                    .attr("d", d => `M${d.source.x},${d.source.y} L${d.target.x},${d.target.y}`);

                this.nodeGroup
                    .attr("transform", d => `translate(${d.x},${d.y})`);

                this.linkLabel
                    .attr("transform", (d, i) => {
                        const path = this.shadowRoot.querySelector(`#linkPath${i}`); // Use shadowRoot for path selection
                        if (!path) return null;

                        const pathLength = path.getTotalLength();
                        const midPoint = path.getPointAtLength(pathLength / 2);

                        const start = path.getPointAtLength(0);
                        const end = path.getPointAtLength(pathLength);

                        const angle = Math.atan2(end.y - start.y, end.x - start.x) * (180 / Math.PI);

                        if (angle > 90 || angle < -90) {
                            return `translate(${midPoint.x},${midPoint.y}) rotate(180) translate(${-midPoint.x},${-midPoint.y})`;
                        } else {
                            return null;
                        }
                    });
            }

            renderGraph() {
                const tempText = this.svg.append("text").attr("font-size", "10px").attr("opacity", 0);
                this.graph.links.forEach(link => {
                    tempText.text(link.name);
                    const bbox = tempText.node().getBBox();
                    link._labelWidth = bbox.width;
                });
                tempText.remove();

                this.setupSimulation();

                const gZoom = this.svg.append("g").attr("class", "zoom-layer");

                const femaleNode = this.graph.nodes.find(n => n.id.endsWith('Female'));
                const personNode = this.graph.nodes.find(n => n.id.endsWith('Person'));
                if (femaleNode && personNode) {
                    const padding = 120; 
                    const minX = Math.min(femaleNode.x, personNode.x) - padding;
                    const maxX = Math.max(femaleNode.x, personNode.x) + padding;
                    const minY = Math.min(femaleNode.y, personNode.y) - padding;
                    const maxY = Math.max(femaleNode.y, personNode.y) + padding;
                    const centerX = (minX + maxX) / 2;
                    const centerY = (minY + maxY) / 2;
                    const radius = Math.max(maxX - minX, maxY - minY) / 2 + padding * 0.7;
                }

                const zoom = d3.zoom()
                    .scaleExtent([0.1, 5])
                    .on("zoom", () => {
                        gZoom.attr("transform", d3.event.transform);
                    });

                this.svg.call(zoom);
                this.svg.style("background-color", "white");

                this.link = gZoom.append("g")
                    .attr("class", "links")
                    .selectAll("path")
                    .data(this.graph.links)
                    .enter()
                    .append("path")
                    .attr("id", (d, i) => `linkPath${i}`)
                    .attr("stroke-width", 3)
                    .attr("stroke", "#666")
                    .attr("fill", "none")
                    .attr("marker-end", "url(#arrowhead)")
                    .attr("method", "align");

                this.linkLabel = gZoom.append("g")
                    .attr("class", "link-labels")
                    .selectAll("text")
                    .data(this.graph.links)
                    .enter()
                    .append("text")
                    .attr("font-size", 12)
                    .attr("fill", "black")
                    .attr("font-weight", "normal")
                    .attr("text-anchor", "middle")
                    .append("textPath")
                    .attr("xlink:href", (d, i) => `#linkPath${i}`)
                    .attr("startOffset", "50%")
                    .text(d => d.name);

                this.nodeGroup = gZoom.append("g")
                    .attr("class", "nodes")
                    .selectAll("g")
                    .data(this.graph.nodes)
                    .enter()
                    .append("g")
                    .style('cursor', 'grab')
                    .call(d3.drag()
                        .on("start", function (d) {
                            if (d.fx !== null && d.fy !== null && d.fx !== undefined && d.fy !== undefined) {
                                d._skipDrag = true;
                                return;
                            }
                            d._skipDrag = false;
                            if (!d3.event.active) this.simulation.alphaTarget(0.3).restart();
                            d._wasFixed = false;
                            d.fx = d.x;
                            d.fy = d.y;
                        }.bind(this))
                        .on("drag", function (d) {
                            if (d._skipDrag) return;
                            d.fx = d3.event.x;
                            d.fy = d3.event.y;
                        })
                        .on("end", function (d) {
                            if (d._skipDrag) return;
                            if (!d3.event.active) this.simulation.alphaTarget(0);
                            d.fx = null;
                            d.fy = null;
                            delete d._wasFixed;
                        }.bind(this))
                    );

                const colors = d3.scaleOrdinal(d3.schemeCategory10);
                this.nodeGroup.each(function (d) {
                    const group = d3.select(this);

                    let fillColor = "#1f77b4";
                    let textSize = 12;
                    let textColor = "black";
                    let rx = 4, ry = 4;
                    let fontFamily = "Arial";

                    let shape = "circle";

                    if (d.type === "Literal") {
                        fillColor = "orange";
                        shape = "rect";
                        textSize = 10;
                    } else if (d.type === "Blank") {
                        fillColor = "yellow";
                        shape = "rect";
                        textSize = 12;
                    } else if (d.type === "class" || d.type === "Class") {
                        fillColor = "blue";
                        shape = "circle";
                        textSize = 11;
                    }

                    const tempText = group.append("text")
                        .attr("font-size", textSize)
                        .attr("font-family", fontFamily)
                        .attr("opacity", 0)
                        .text(d.name);
                    const bbox = tempText.node().getBBox();
                    tempText.remove();

                    const textWidth = bbox.width;
                    const textHeight = bbox.height;
                    const paddingX = 10;
                    const paddingY = 6;

                    if (shape === "rect") {
                        const rectWidth = textWidth + paddingX * 2;
                        const rectHeight = textHeight + paddingY * 2;

                        group.append("rect")
                            .attr("x", -rectWidth / 2)
                            .attr("y", -rectHeight / 2)
                            .attr("width", rectWidth)
                            .attr("height", rectHeight)
                            .attr("fill", fillColor)
                            .attr("rx", rx)
                            .attr("ry", ry);
                    } else if (shape === "circle") {
                        const radius = Math.max(textWidth, textHeight) / 2 + 10;
                        group.append("circle")
                            .attr("r", radius)
                            .attr("fill", fillColor);
                    }

                    group.append("text")
                        .text(d.name)
                        .attr("font-size", textSize)
                        .attr("font-family", fontFamily)
                        .attr("fill", textColor)
                        .attr("text-anchor", "middle")
                        .attr("dominant-baseline", "middle");
                });

                this.simulation
                    .nodes(this.graph.nodes)
                    .on("tick", () => this.updatePositions());

                this.simulation.force("link").links(this.graph.links);
                this.simulation.alpha(1).restart();

                const bounds = gZoom.node().getBBox();
                const fullWidth = this.width;
                const fullHeight = this.height;
                const width = bounds.width;
                const height = bounds.height;
                const midX = bounds.x + width / 2;
                const midY = bounds.y + height / 2;

                const scale = 0.85 / Math.max(width / fullWidth, height / fullHeight);
                const translate = [fullWidth / 2 - scale * midX, fullHeight / 2 - scale * midY];

                this.svg.transition()
                    .duration(500)
                    .call(
                        zoom.transform,
                        d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
                    );

            }


            setControls() {
                const sliderGroup = this.svg.append("g").attr("class", "sliders");

                const sliderWidth = 120;
                const sliderX = 20;
                let sliderY = this.height - 100;

                const createSlider = (label, min, max, initial, step, onChange) => {
                    const group = sliderGroup.append("g")
                        .attr("transform", `translate(${sliderX}, ${sliderY})`);

                    group.append("text")
                        .text(`${label}: ${initial}`)
                        .attr("x", 0)
                        .attr("y", -10)
                        .attr("font-size", "10px")
                        .attr("class", `label-${label}`);

                    group.append("line")
                        .attr("x1", 0)
                        .attr("x2", sliderWidth)
                        .attr("y1", 0)
                        .attr("y2", 0)
                        .attr("stroke", "#ccc")
                        .attr("stroke-width", 2);

                    const handle = group.append("circle")
                        .attr("cx", ((initial - min) / (max - min)) * sliderWidth)
                        .attr("cy", 0)
                        .attr("r", 6)
                        .attr("fill", "#888")
                        .style("cursor", "pointer")
                        .call(d3.drag().on("drag", () => {
                            let x = Math.max(0, Math.min(sliderWidth, d3.event.x));
                            handle.attr("cx", x);

                            const value = min + (x / sliderWidth) * (max - min);
                            group.select(`text.label-${label}`)
                                .text(`${label}: ${Math.round(value)}`);

                            onChange(value);
                        }));

                    sliderY += 40;
                };

                createSlider("Charge", -300, -10, -50, 1, val => {
                    this.simulation.force("charge").strength(val);
                    this.simulation.alpha(1).restart();
                });

                createSlider("Distance", 10, 200, 10, 1, val => {
                    this.simulation.force("link").distance(val);
                    this.simulation.alpha(1).restart();
                });

                const buttonGroup = sliderGroup.append("g")
                    .attr("transform", `translate(${sliderX}, ${sliderY - 15})`)
                    .style("cursor", "pointer")
                    .on("click", () => {
                        let _this = this;
                        this.simulation.force("charge").strength(this.defaultCharge);
                        this.simulation.force("link").distance(this.defaultDistance);
                        this.simulation.alpha(1).restart();

                        sliderGroup.select("text.label-Charge").text(`Charge: ${this.defaultCharge}`);
                        sliderGroup.select("text.label-Distance").text(`Distance: ${this.defaultDistance}`);

                        sliderGroup.selectAll("g").each(function () {
                            const text = d3.select(this).select("text").text();
                            if (text.startsWith("Charge")) {
                                d3.select(this).select("circle")
                                    .attr("cx", ((_this.defaultCharge - (-300)) / (290)) * sliderWidth);
                            } else if (text.startsWith("Distance")) {
                                d3.select(this).select("circle")
                                    .attr("cx", ((_this.defaultDistance - 10) / 190) * sliderWidth);
                            }
                        })
                    });

                buttonGroup.append("rect")
                    .attr("width", 60)
                    .attr("height", 20)
                    .attr("rx", 4)
                    .attr("ry", 4)
                    .attr("fill", "#eee")
                    .attr("stroke", "#aaa");

                buttonGroup.append("text")
                    .text("Reset")
                    .attr("x", 30)
                    .attr("y", 14)
                    .attr("text-anchor", "middle")
                    .attr("font-size", "10px");
            }
        }
        customElements.define('kg-graph', KGGraphVis);

        // Once the custom element is defined, set its TTL property
        const graphElement = document.getElementById('myGraph');

        // Checkbox event listeners
        document.getElementById('toggle-labels').addEventListener('change', function() {
            graphElement.setShowLabels(this.checked);
        });
        document.getElementById('toggle-comments').addEventListener('change', function() {
            graphElement.setShowComments(this.checked);
        });
    </script>
</body>

</html>
