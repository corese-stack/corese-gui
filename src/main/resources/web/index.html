<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Visualization</title>
    <script src="../web/lib/d3.min.js"></script>
    <script src="../web/lib/ttl2jsonld.js"></script>
    <style>
        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        #container {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
        }

        kg-graph {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="graph-controls"
            style="position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(255,255,255,0.95); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 10px 16px; font-size: 14px;">
            <label style="display: block; margin-bottom: 6px;">
                <input type="checkbox" id="toggle-edge-labels" checked>
                Show Edge Labels
            </label>
        </div>
        <kg-graph id="myGraph" width="100%" height="100%"></kg-graph>
    </div>

    <script>
        class KGGraphVis extends HTMLElement {
            setShowLabels(show) {
                if (!this.shadowRoot) return;

                d3.select(this.shadowRoot)
                    .selectAll('.nodes text')
                    .style('display', show ? null : 'none');
            }

            setShowEdgeLabels(show) {
                if (this.linkLabel) {
                    this.linkLabel.style('display', show ? null : 'none');
                }
            }
            setShowComments(show) {
                if (!this.shadowRoot) return;
                d3.select(this.shadowRoot)
                    .selectAll('.rdfs-comment')
                    .style('display', show ? null : 'none');
            }

            constructor() {
                super()
                this.attachShadow({ mode: "open" });

                this.svg = null;
                this.simulation = null;
                this.defaultCharge = -1000;
                this.defaultDistance = 180;
                this.baseLinkDistance = this.defaultDistance;
                this.linkHover = null;

                this.internalData = new WeakMap()
                this.internalData.set(this, {});
                this.resizeObserver = null;
            }

            reset() {
                if (this.simulation) {
                    this.simulation.stop();
                    this.simulation = null;
                }
                if (this.svg) {
                    this.svg.selectAll("*").remove();
                }

                this.graph = null;
                this.jsonLDOntology = null;

                this.shadowRoot.innerHTML = '';
                this.render();
                this.svg = d3.select(this.shadowRoot.querySelector("#chart-container"));
            }



            set ttl(ttl) {
                const data = this.internalData.get(this) || {};
                data.ttl = ttl;
                this.internalData.set(this, data);
                this.drawChart()
            }

            get ttl() {
                return this.internalData.get(this)?.ttl;
            }

            async connectedCallback() {
                this.render();

                this.observeResize();

                await this.updateSize();

                this.svg = d3.select(this.shadowRoot.querySelector("#chart-container"))
                    .attr('width', this.width)
                    .attr('height', this.height)

                const defs = this.svg.append("defs");

                defs.append("marker")
                    .attr("id", "arrowhead")
                    .attr("viewBox", "0 -5 10 10")
                    .attr("refX", 15)
                    .attr("refY", 0)
                    .attr("markerWidth", 6)
                    .attr("markerHeight", 6)
                    .attr("orient", "auto")
                    .attr("fill", "#999")
                    .append("path")
                    .attr("d", "M0,-5L10,0L0,5");

                defs.append("marker")
                    .attr("id", "arrowhead-unfilled")
                    .attr("viewBox", "0 -5 10 10")
                    .attr("refX", 15)
                    .attr("refY", 0)
                    .attr("markerWidth", 6)
                    .attr("markerHeight", 6)
                    .attr("orient", "auto")
                    .attr("fill", "none")
                    .attr("stroke", "#999")
                    .append("path")
                    .attr("d", "M0,-5L10,0L0,5");
            }

            disconnectedCallback() {
                if (this.resizeObserver) {
                    this.resizeObserver.disconnect();
                }
            }

            render() {
                this.shadowRoot.innerHTML = `
                    <style>
                        :host {
                            display: block;
                            width: 100%;
                            height: 100%;
                        }
                        .container {
                            width: 100%;
                            height: 100%;
                            box-sizing: border-box;
                        }
                        svg {
                            width: 100%;
                            height: 100%;
                            border: 1px solid #ccc;
                            display: block;
                        }
                        /* --- CHANGE: Added styles for the tooltip --- */
                        .kg-tooltip {
                            position: absolute;
                            padding: 6px 10px;
                            background: rgba(0, 0, 0, 0.8);
                            color: #fff;
                            border-radius: 4px;
                            font-size: 14px;
                            pointer-events: none;
                            opacity: 0;
                            transition: opacity 0.2s;
                            z-index: 100;
                        }
                    </style>
                    <div class="container">
                        <svg id="chart-container"></svg>
                    </div>
                    <!-- --- CHANGE: Added the tooltip div --- -->
                    <div class="kg-tooltip"></div>
                `;
            }

            observeResize() {
                this.resizeObserver = new ResizeObserver(async () => {
                    await this.updateSize();
                    if (this.svg) {
                        this.svg.attr('width', this.width).attr('height', this.height);
                        if (this.simulation) {
                            this.simulation.force("center", d3.forceCenter(this.width / 2, this.height / 2));
                            this.simulation.alpha(0.2).restart();
                        }
                    }
                });
                this.resizeObserver.observe(this);
            }

            async updateSize() {
                const rect = this.getBoundingClientRect();
                this.width = rect.width;
                this.height = rect.height;
            }

            async computePixelValue(attr) {
                return null;
            }

            async drawChart() {
                if (!this.width || !this.height) {
                    await this.updateSize();
                }
                if (this.simulation) {
                    this.simulation.stop();
                    this.simulation = null;
                }
                if (this.svg) {
                    this.svg.selectAll("*").remove();
                }
                this.svg = d3.select(this.shadowRoot.querySelector("#chart-container"))
                    .attr('width', this.width)
                    .attr('height', this.height);

                const defs = this.svg.append("defs");
                defs.append("marker")
                    .attr("id", "arrowhead")
                    .attr("viewBox", "0 -5 10 10")
                    .attr("refX", 15)
                    .attr("refY", 0)
                    .attr("markerWidth", 6)
                    .attr("markerHeight", 6)
                    .attr("orient", "auto")
                    .attr("fill", "#999")
                    .append("path")
                    .attr("d", "M0,-5L10,0L0,5");

                if (!this.ttl) return;

                this.jsonLDOntology = ttl2jsonld.parse(this.ttl);

                let graph = await this.createGraph();
                this.graph = await this.duplicateTargetsForMultipleLinks(graph);

                this.graph.nodes.forEach(node => { node.degree = 0; });
                this.graph.links.forEach(link => {
                    const sourceNode = this.graph.nodes.find(n => n.id === link.source);
                    const targetNode = this.graph.nodes.find(n => n.id === link.target);
                    if (sourceNode) sourceNode.degree = (sourceNode.degree || 0) + 1;
                    if (targetNode) targetNode.degree = (targetNode.degree || 0) + 1;
                });

                await this.layoutGraphWithHierarchy(this.graph);

                this.graph.nodes.forEach(node => {
                    if (typeof node.x !== 'number' || isNaN(node.x) || node.x === 0) node.x = this.width / 2 + (Math.random() - 0.5) * 200;
                    if (typeof node.y !== 'number' || isNaN(node.y) || node.y === 0) node.y = this.height / 2 + (Math.random() - 0.5) * 200;

                    if (node.x === undefined || node.y === undefined || (node.x === 0 && node.y === 0)) {
                        node.x = this.width / 2 + (Math.random() - 0.5) * 200;
                        node.y = this.height / 2 + (Math.random() - 0.5) * 200;
                    }
                });

                this.renderGraph();
                this.setControls();
            }
            async createGraph() {
                let graph = {
                    nodes: [],
                    links: []
                };

                const addNode = (id, type) => {
                    let node = graph.nodes.find(n => n.id === id);
                    if (!node) {
                        node = { id, name: id, type };
                        graph.nodes.push(node);
                    }
                    return node;
                };

                this.jsonLDOntology['@graph'].forEach((item) => {
                    const subj = item['@id'] || item['@value'] || item['@node'] || item['@blank'] || item['@literal'];
                    let subjType = 'default';

                    // Correctly identify Class, Property, and Literal nodes
                    if (item['@type'] && item['@type'].includes('Class')) {
                        subjType = 'Class';
                    } else if (item['@type'] && item['@type'].includes('Property')) {
                        subjType = 'Property';
                    } else if (item['@type'] && item['@type'].includes('Literal')) {
                        subjType = 'Literal';
                    } else if (subj && subj.startsWith('_:')) {
                        subjType = 'Blank';
                    } else if (subj) {
                        // Default to Class if it's a resource but has no explicit type
                        subjType = 'Class';
                    }

                    const subjNode = addNode(subj, subjType);
                    subjNode.rawData = item; // Store the original data on the node

                    Object.keys(item).forEach(pred => {
                        if (pred === '@id' || pred === '@type') return;

                        let objs = item[pred];
                        if (!Array.isArray(objs)) objs = [objs];

                        objs.forEach(obj => {
                            let objId = obj['@id'] || obj['@value'] || obj['@node'] || obj['@blank'] || obj['@literal'] || obj;

                            let objType = 'default';
                            if (typeof obj === 'object' && obj !== null) {
                                if (obj['@id']) {
                                    objType = 'Class';
                                } else {
                                    objType = 'Literal';
                                }
                            } else {
                                objType = 'Literal';
                            }

                            addNode(objId, objType);
                            graph.links.push({ source: subj, target: objId, name: pred });
                        });
                    });
                });

                graph.links.forEach(link => {

                    const propertyDefinitionNode = graph.nodes.find(n => n.id === link.name);

                    if (propertyDefinitionNode && propertyDefinitionNode.rawData) {
                        if (propertyDefinitionNode.rawData['rdfs:range']) {
                            link.propertyType = 'Object';
                        } else {
                            link.propertyType = 'Datatype';
                        }
                    }
                });

                return graph;
            }
            async duplicateTargetsForMultipleLinks(graph) {
                const sourceTargetCount = {};

                graph.links.forEach(link => {
                    const key = `${link.source}->${link.target}`;
                    sourceTargetCount[key] = (sourceTargetCount[key] || 0) + 1;
                });

                const newNodes = [...graph.nodes];
                const newLinks = [];
                const copyIndex = {};

                graph.links.forEach(link => {
                    const key = `${link.source}->${link.target}`;

                    if (sourceTargetCount[key] > 1) {
                        copyIndex[key] = (copyIndex[key] || 0) + 1;

                        if (copyIndex[key] === 1) {
                            newLinks.push(link);
                        } else {
                            const originalTarget = graph.nodes.find(n => n.id === link.target);
                            const newTargetId = `${link.target}_copy${copyIndex[key]}`;
                            const newTarget = {
                                ...originalTarget,
                                id: newTargetId
                            };

                            newNodes.push(newTarget);
                            newLinks.push({
                                ...link,
                                target: newTargetId
                            });
                        }
                    } else {
                        newLinks.push(link);
                    }
                });
                return {
                    nodes: newNodes,
                    links: newLinks
                };
            }

            async buildHierarchy(graph) {
                const subclassLinks = graph.links.filter(l => l.name === 'rdfs:subClassOf');
                const childrenByParent = {};
                const allIds = new Set();
                subclassLinks.forEach(link => {
                    if (!childrenByParent[link.target]) {
                        childrenByParent[link.target] = [];
                    }
                    childrenByParent[link.target].push(link.source);
                    allIds.add(link.source);
                    allIds.add(link.target);
                });
                const childIds = new Set(subclassLinks.map(l => l.source));
                const rootIds = [...allIds].filter(id => !childIds.has(id));
                function buildNode(id) {
                    return {
                        id,
                        children: (childrenByParent[id] || []).map(buildNode)
                    };
                }
                return rootIds.map(buildNode);
            }

            async layoutGraphWithHierarchy(graph) {
                const hierarchyRoots = await this.buildHierarchy(graph);
                const tree = d3.tree().nodeSize([70, 200]);
                const positionedNodes = new Map();
                hierarchyRoots.forEach((root, index) => {
                    const rootHierarchy = d3.hierarchy(root, d => d.children);
                    tree(rootHierarchy);
                    const xOffset = index * 400;
                    rootHierarchy.descendants().forEach(d => {
                        positionedNodes.set(d.data.id, {
                            x: d.y + xOffset,
                            y: d.x
                        });
                    });
                });
                graph.nodes.forEach(node => {
                    if (positionedNodes.has(node.id)) {
                        const pos = positionedNodes.get(node.id);
                        node.fx = pos.x;
                        node.fy = pos.y;
                    }
                });
                graph.nodes.forEach(node => {
                    if (!node.x && !node.y) {
                        const linked = graph.links.filter(l => l.source === node.id || l.target === node.id);
                        const connected = linked.map(l =>
                            l.source === node.id ? l.target : l.source
                        ).filter(id => positionedNodes.has(id));

                        if (connected.length > 0) {
                            const avgX = d3.mean(connected.map(id => positionedNodes.get(id).x));
                            const avgY = d3.mean(connected.map(id => positionedNodes.get(id).y));
                            node.x = avgX + (Math.random() - 0.5) * 50;
                            node.y = avgY + 100 + (Math.random() - 0.5) * 30;
                        } else {
                            node.x = Math.random() * 800;
                            node.y = 800;
                        }
                    }
                });
            }

            setupSimulation() {
                this.graph.nodes.forEach(d => {
                    d.x = Math.random() * this.width;
                    d.y = Math.random() * this.height;
                });

                this.simulation = d3.forceSimulation(this.graph.nodes)
                    .force("link", d3.forceLink(this.graph.links)
                        .id(d => d.id)
                        .distance(d => {
                            const labelPadding = 20;
                            const labelWidth = d._labelWidth || 0;
                            return this.baseLinkDistance + labelWidth + labelPadding;
                        })
                        .strength(0.8)
                    )
                    .force("charge", d3.forceManyBody().strength(this.defaultCharge))
                    .force("center", d3.forceCenter(this.width / 2, this.height / 2))
                    .force("collision", d3.forceCollide().radius(d => d.collisionRadius + 10))
                    .force("x", d3.forceX(this.width / 2).strength(0.02))
                    .force("y", d3.forceY(this.height / 2).strength(0.02));

                this.simulation.on('end', () => {
                    this.graph.nodes.forEach(n => {
                        if (n.fx !== undefined) delete n.fx;
                        if (n.fy !== undefined) delete n.fy;
                    });
                });
            }

            truncateText(text) {
                if (typeof text !== 'string' || text.length <= 25) {
                    return { text: text, truncated: false };
                }
                return { text: text.substring(0, 10) + '…', truncated: true };
            }

            updatePositions() {
                const pathData = d => `M${d.source.x},${d.source.y} L${d.target.x},${d.target.y}`;

                this.link.attr("d", pathData);

                if (this.linkHover) {
                    this.linkHover.attr("d", pathData);
                }

                this.nodeGroup
                    .attr("transform", d => `translate(${d.x},${d.y})`)
            }

            renderGraph() {
                const tempLinkText = this.svg.append("text").attr("font-size", "12px").attr("opacity", 0);
                this.graph.links.forEach(link => {
                    tempLinkText.text(link.name);
                    const bbox = tempLinkText.node().getBBox();
                    link._labelWidth = bbox.width;
                });
                tempLinkText.remove();

                const degreeExtent = d3.extent(this.graph.nodes, d => d.degree);

                const degreeBonusScale = d3.scaleSqrt()
                    .domain(degreeExtent[0] > 0 ? degreeExtent : [0, 1])
                    .range([0, 15]);

                const tempNodeText = this.svg.append("text").attr("opacity", 0);
                this.graph.nodes.forEach(d => {
                    let nameToShow = d.name;
                    if (d.rawData && d.rawData['rdfs:label']) {
                        let labels = d.rawData['rdfs:label'];
                        if (!Array.isArray(labels)) labels = [labels];
                        const enLabel = labels.find(l => l['@language'] === 'en');
                        nameToShow = enLabel ? enLabel['@value'] : (labels[0]['@value'] || labels[0] || nameToShow);
                    }
                    d.fullName = nameToShow;

                    const textSize = (d.type === "Literal") ? 10 : (d.type === "class" || d.type === "Class") ? 11 : 12;
                    tempNodeText.attr("font-size", textSize).attr("font-family", "Arial");

                    let textToDisplay;
                    if (typeof nameToShow !== 'string' || nameToShow.length <= 10) {
                        textToDisplay = nameToShow;
                        d.isTruncated = false;
                    } else {
                        textToDisplay = nameToShow.substring(0, 10) + '…';
                        d.isTruncated = true;
                    }
                    d.displayName = textToDisplay;

                    tempNodeText.text(textToDisplay);
                    const textWidth = tempNodeText.node().getBBox().width;
                    const textRadius = (textWidth / 2) + 8;

                    const bonus = degreeBonusScale(d.degree);
                    d.collisionRadius = textRadius + bonus;
                });
                tempNodeText.remove();


                this.setupSimulation();

                const gZoom = this.svg.append("g").attr("class", "zoom-layer");

                const zoom = d3.zoom()
                    .scaleExtent([0.1, 5])
                    .on("zoom", () => {
                        gZoom.attr("transform", d3.event.transform);
                    });

                this.svg.call(zoom);
                this.svg.style("background-color", "white");

                this.link = gZoom.append("g")
                    .attr("class", "links")
                    .selectAll("path")
                    .data(this.graph.links)
                    .enter()
                    .append("path")
                    .attr("id", (d, i) => `linkPath${i}`)
                    .attr("stroke-width", 3)
                    .attr("stroke", "#666")
                    .attr("fill", "none")
                    .attr("stroke-dasharray", d => (d.name === 'rdfs:subClassOf' || d.name === 'rdfs:subPropertyOf') ? "5,5" : null)
                    .attr("marker-end", d => (d.name === 'rdfs:subClassOf' || d.name === 'rdfs:subPropertyOf') ? "url(#arrowhead-unfilled)" : "url(#arrowhead)")


                const tooltip = d3.select(this.shadowRoot.querySelector(".kg-tooltip"));

                this.linkHover = gZoom.append("g")
                    .attr("class", "link-hover-paths")
                    .selectAll("path")
                    .data(this.graph.links)
                    .enter()
                    .append("path")
                    .attr("stroke-width", 15)
                    .attr("stroke", "transparent")
                    .attr("fill", "none")
                    .style("cursor", "pointer")
                    .on("mouseover", function (d) {
                        const htmlContent = `<strong>Predicate:</strong> ${d.name}`;
                        tooltip.style("opacity", 1)
                            .style("text-align", "center")
                            .html(htmlContent);
                    })
                    .on("mousemove", function () {
                        tooltip.style("left", (d3.event.pageX + 15) + "px")
                            .style("top", (d3.event.pageY - 10) + "px");
                    })
                    .on("mouseout", function () {
                        tooltip.style("opacity", 0);
                    });

                this.linkLabel = gZoom.append("g")
                    .attr("class", "link-labels")
                    .selectAll("text")
                    .data(this.graph.links)
                    .enter()
                    .append("text")
                    .attr("font-size", 12)
                    .attr("fill", d => {
                        if (d.propertyType === 'Datatype') return '#d62728';
                        if (d.name.startsWith('rdfs:')) return '#636363';
                        return 'black';
                    })
                    .attr("font-weight", "normal")
                    .attr("text-anchor", "middle")
                    .append("textPath")
                    .attr("xlink:href", (d, i) => `#linkPath${i}`)
                    .attr("startOffset", "50%")
                    .text(d => d.name);

                this.setShowEdgeLabels(document.getElementById('toggle-edge-labels').checked);

                this.nodeGroup = gZoom.append("g")
                    .attr("class", "nodes")
                    .selectAll("g")
                    .data(this.graph.nodes)
                    .enter()
                    .append("g")
                    .style('cursor', 'grab')
                    .call(d3.drag()
                        .on("start", function (d) {
                            if (d.fx !== null && d.fy !== null && d.fx !== undefined && d.fy !== undefined) {
                                d._skipDrag = true; return;
                            }
                            d._skipDrag = false;
                            if (!d3.event.active) this.simulation.alphaTarget(0.3).restart();
                            d.fx = d.x;
                            d.fy = d.y;
                        }.bind(this))
                        .on("drag", function (d) {
                            if (d._skipDrag) return;
                            d.fx = d3.event.x;
                            d.fy = d3.event.y;
                        })
                        .on("end", function (d) {
                            if (d._skipDrag) return;
                            if (!d3.event.active) this.simulation.alphaTarget(0);
                            d.fx = null;
                            d.fy = null;
                        }.bind(this))
                    )
                    .on("mouseover", function (d) {
                        const escape = (str) => String(str)
                            .replace(/&/g, '&amp;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;')
                            .replace(/"/g, '&quot;')
                            .replace(/'/g, '&#39;');

                        let htmlContent = [`<strong>${escape(d.fullName)}</strong>`];

                        if (d.rawData) {
                            Object.keys(d.rawData).forEach(key => {
                                if (key.startsWith('@') || key === 'id') return;

                                let values = d.rawData[key];
                                if (!Array.isArray(values)) values = [values];

                                values.forEach(valueObj => {
                                    if (valueObj['@id'] === undefined) {
                                        const text = valueObj['@value'] || valueObj;
                                        const lang = valueObj['@language'] ? `@${valueObj['@language']}` : '';
                                        const type = (valueObj['@type'] && valueObj['@type'].includes(':')) ? `^^${valueObj['@type'].split(':').pop()}` : '';

                                        htmlContent.push(`<strong>${escape(key)}${lang}:</strong> ${escape(text)} ${type}`);
                                    }
                                });
                            });
                        }

                        tooltip.style("opacity", 1)
                            .style("text-align", "left")
                            .html(htmlContent.join('<br>'));
                    })
                    .on("mousemove", function () {
                        tooltip.style("left", (d3.event.pageX + 15) + "px")
                            .style("top", (d3.event.pageY - 10) + "px");
                    })
                    .on("mouseout", function () {
                        tooltip.style("opacity", 0);
                    });

                this.nodeGroup.each(function (d) {
                    const group = d3.select(this);

                    let fillColor = "#1f77b4";
                    let textSize = 12;
                    let textColor = "white";
                    let rx = 4, ry = 4;
                    let shape = "circle";
                    if (d.type === "Property") {
                        fillColor = "#2ca02c";
                        shape = "rect";
                    }
                    else if (d.type === "Literal") {
                        fillColor = "orange";
                        shape = "rect";
                        textSize = 10;
                    } else if (d.type === "Blank") {
                        fillColor = "yellow";
                        shape = "rect";
                        textSize = 12;
                    } else if (d.type === "class" || d.type === "Class") {
                        fillColor = "#1f77b4";
                        shape = "circle";
                        textSize = 11;
                    }

                    const radius = d.collisionRadius;

                    if (shape === "rect") {
                        const rect = group.append("rect")
                            .attr("x", -radius)
                            .attr("y", -radius * 0.75)
                            .attr("width", radius * 2)
                            .attr("height", radius * 1.5)
                            .attr("fill", fillColor)
                            .attr("rx", rx)
                            .attr("ry", ry);

                        if (d.type === "Property") {
                            rect.attr("transform", `rotate(45)`);
                        }
                    } else {
                        group.append("circle")
                            .attr("r", radius)
                            .attr("fill", fillColor);
                    }

                    group.append("text")
                        .text(d.displayName)
                        .attr("font-size", textSize)
                        .attr("font-family", "Arial")
                        .attr("fill", textColor)
                        .attr("text-anchor", "middle")
                        .attr("dominant-baseline", "central");
                });

                this.simulation
                    .nodes(this.graph.nodes)
                    .on("tick", () => this.updatePositions());

                this.simulation.force("link").links(this.graph.links);
                this.simulation.alpha(1).restart();

                const bounds = gZoom.node().getBBox();
                const fullWidth = this.width;
                const fullHeight = this.height;
                const width = bounds.width;
                const height = bounds.height;
                if (width > 0 && height > 0) {
                    const midX = bounds.x + width / 2;
                    const midY = bounds.y + height / 2;
                    const scale = 0.85 / Math.max(width / fullWidth, height / fullHeight);
                    const translate = [fullWidth / 2 - scale * midX, fullHeight / 2 - scale * midY];

                    this.svg.transition()
                        .duration(500)
                        .call(
                            zoom.transform,
                            d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
                        );
                }
            }
            setControls() {
                const sliderGroup = this.svg.append("g").attr("class", "sliders");

                const sliderWidth = 120;
                const sliderX = 20;
                let sliderY = this.height - 100;

                const createSlider = (label, min, max, initial, step, onChange) => {
                    const group = sliderGroup.append("g")
                        .attr("transform", `translate(${sliderX}, ${sliderY})`);
                    group.append("text")
                        .text(`${label}: ${initial}`)
                        .attr("x", 0)
                        .attr("y", -10)
                        .attr("font-size", "10px")
                        .attr("class", `label-${label}`);
                    group.append("line")
                        .attr("x1", 0)
                        .attr("x2", sliderWidth)
                        .attr("y1", 0)
                        .attr("y2", 0)
                        .attr("stroke", "#ccc")
                        .attr("stroke-width", 2);
                    const handle = group.append("circle")
                        .attr("cx", ((initial - min) / (max - min)) * sliderWidth)
                        .attr("cy", 0)
                        .attr("r", 6)
                        .attr("fill", "#888")
                        .style("cursor", "pointer")
                        .call(d3.drag().on("drag", () => {
                            let x = Math.max(0, Math.min(sliderWidth, d3.event.x));
                            handle.attr("cx", x);
                            const value = min + (x / sliderWidth) * (max - min);
                            group.select(`text.label-${label}`)
                                .text(`${label}: ${Math.round(value)}`);
                            onChange(value);
                        }));
                    sliderY += 40;
                };

                createSlider("Charge", -2000, -10, this.defaultCharge, 1, val => {
                    this.simulation.force("charge").strength(val);
                    this.simulation.alpha(1).restart();
                });

                createSlider("Distance", 10, 300, this.baseLinkDistance, 1, val => {
                    this.baseLinkDistance = val;
                    this.simulation.alpha(1).restart();
                });

                const buttonGroup = sliderGroup.append("g")
                    .attr("transform", `translate(${sliderX}, ${sliderY - 15})`)
                    .style("cursor", "pointer")
                    .on("click", () => {
                        let _this = this;
                        this.simulation.force("charge").strength(this.defaultCharge);
                        this.baseLinkDistance = this.defaultDistance;
                        this.simulation.alpha(1).restart();

                        sliderGroup.select("text.label-Charge").text(`Charge: ${this.defaultCharge}`);
                        sliderGroup.select("text.label-Distance").text(`Distance: ${this.defaultDistance}`);
                        sliderGroup.selectAll("g").each(function () {
                            const text = d3.select(this).select("text").text();
                            const g = d3.select(this);
                            if (text.startsWith("Charge")) {
                                const newRange = -10 - (-2000);
                                const newCx = ((_this.defaultCharge - (-2000)) / newRange) * sliderWidth;
                                g.select("circle").attr("cx", newCx);
                            } else if (text.startsWith("Distance")) {
                                const newRange = 300 - 10;
                                const newCx = ((_this.defaultDistance - 10) / newRange) * sliderWidth;
                                g.select("circle").attr("cx", newCx);
                            }
                        })
                    });

                buttonGroup.append("rect")
                    .attr("width", 60)
                    .attr("height", 20)
                    .attr("rx", 4)
                    .attr("ry", 4)
                    .attr("fill", "#eee")
                    .attr("stroke", "#aaa");

                buttonGroup.append("text")
                    .text("Reset")
                    .attr("x", 30)
                    .attr("y", 14)
                    .attr("text-anchor", "middle")
                    .attr("font-size", "10px");
            }
        }
        customElements.define('kg-graph', KGGraphVis);

        document.getElementById('toggle-edge-labels').addEventListener('change', function () {
            const currentGraphElement = document.getElementById('myGraph');
            if (currentGraphElement) {
                currentGraphElement.setShowEdgeLabels(this.checked);
            }
        });
    </script>
</body>

</html>
